# L4 SNI router — shares TCP 443 between nginx HTTP and LiveKit TURN/TLS
# Place in /etc/nginx/modules-enabled/ or include from nginx.conf main context
#
# Requires: load_module modules/ngx_stream_module.so; (usually in /etc/nginx/nginx.conf)
#           nginx built with --with-stream and --with-stream_ssl_preread_module

stream {
    map $ssl_preread_server_name $backend {
        turn.gros-sans-dessein.com  livekit_turn;
        default                     nginx_https;
    }

    upstream livekit_turn {
        server 127.0.0.1:5349;
    }

    upstream nginx_https {
        server 127.0.0.1:8443;
    }

    server {
        listen 443;
        listen [::]:443;
        proxy_pass $backend;
        ssl_preread on;
    }
}
