services:
  postgres:
    image: docker.io/library/postgres:18
    container_name: librecord-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: librecord
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  minio:
    image: docker.io/minio/minio:latest
    container_name: librecord-minio-dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data

  livekit:
    image: docker.io/livekit/livekit-server:latest
    container_name: librecord-livekit-dev
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      LIVEKIT_KEYS: "devkey: devsecret_that_is_at_least_32chars!"

volumes:
  postgres_dev_data:
  minio_dev_data:


# Run with 'podman-compose -f podman-compose.dev.yml up -d'
# Requires: podman and podman-compose
# Only tested on Arch