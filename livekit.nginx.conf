server {
    listen 443 ssl;
    server_name livekit.gros-sans-dessein.com;

    ssl_certificate /etc/letsencrypt/live/livekit.gros-sans-dessein.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.gros-sans-dessein.com/privkey.pem;

    location / {
        # CORS for LiveKit client SDK
        add_header Access-Control-Allow-Origin "https://librecord.gros-sans-dessein.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

server {
    listen 80;
    server_name livekit.gros-sans-dessein.com;
    return 301 https://$host$request_uri;
}
