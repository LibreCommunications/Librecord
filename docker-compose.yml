x-backend: &backend-base
  build: .
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_started
    livekit:
      condition: service_started
  environment: &backend-env
    ASPNETCORE_ENVIRONMENT: Production
    ASPNETCORE_URLS: http://+:5111
    ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    Jwt__Issuer: Librecord
    Jwt__Audience: LibrecordClient
    Jwt__SigningKey: ${JWT_SIGNING_KEY}
    Jwt__AccessTokenMinutes: 15
    Jwt__RefreshTokenDays: 14
    Minio__Endpoint: minio:9000
    Minio__AccessKey: ${MINIO_ACCESS_KEY}
    Minio__SecretKey: ${MINIO_SECRET_KEY}
    Minio__Bucket: ${MINIO_BUCKET:-librecord-attachments}
    Minio__UseSSL: false
    Security__MessageEncryptionKey: ${MESSAGE_ENCRYPTION_KEY}
    LiveKit__Host: wss://livekit.${DOMAIN}
    LiveKit__ApiKey: ${LIVEKIT_API_KEY}
    LiveKit__ApiSecret: ${LIVEKIT_API_SECRET}
    Cors__Origins__0: https://${DOMAIN}

services:
  backend-blue:
    <<: *backend-base
    container_name: ${COMPOSE_PROJECT_NAME:-librecord}-backend-blue
    profiles: [blue]
    ports:
      - "127.0.0.1:${BLUE_PORT:-5111}:5111"

  backend-green:
    <<: *backend-base
    container_name: ${COMPOSE_PROJECT_NAME:-librecord}-backend-green
    profiles: [green]
    ports:
      - "127.0.0.1:${GREEN_PORT:-5112}:5111"

  postgres:
    image: docker.io/library/postgres:18
    container_name: ${COMPOSE_PROJECT_NAME:-librecord}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  minio:
    image: docker.io/minio/minio:latest
    container_name: ${COMPOSE_PROJECT_NAME:-librecord}-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  livekit:
    image: livekit/livekit-server:latest
    container_name: ${COMPOSE_PROJECT_NAME:-librecord}-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    network_mode: host
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

volumes:
  postgres_data:
  minio_data:
