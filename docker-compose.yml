x-backend: &backend-base
  build:
    context: .
    dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    minio:
      condition: service_started
    postfix:
      condition: service_started
  environment: &backend-env
    ASPNETCORE_ENVIRONMENT: Production
    ASPNETCORE_URLS: http://+:5111
    ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    Jwt__Issuer: Librecord
    Jwt__Audience: LibrecordClient
    Jwt__SigningKey: ${JWT_SIGNING_KEY}
    Jwt__AccessTokenMinutes: 15
    Jwt__RefreshTokenDays: 14
    Minio__Endpoint: minio:9000
    Minio__AccessKey: ${MINIO_ACCESS_KEY}
    Minio__SecretKey: ${MINIO_SECRET_KEY}
    Minio__Bucket: ${MINIO_BUCKET:-librecord-attachments}
    Minio__UseSSL: false
    Security__MessageEncryptionKey: ${MESSAGE_ENCRYPTION_KEY}
    LiveKit__Host: ${LIVEKIT_HOST}
    LiveKit__ApiKey: ${LIVEKIT_API_KEY}
    LiveKit__ApiSecret: ${LIVEKIT_API_SECRET}
    Email__SmtpHost: postfix
    Email__SmtpPort: 587
    Email__FromAddress: noreply@${DOMAIN}
    Cors__Origins__0: https://${DOMAIN}

services:
  backend-blue:
    <<: *backend-base
    profiles: [blue]
    ports:
      - "127.0.0.1:${BLUE_PORT:-5111}:5111"
    mem_limit: 512m
    cpus: 1.0

  backend-green:
    <<: *backend-base
    profiles: [green]
    ports:
      - "127.0.0.1:${GREEN_PORT:-5112}:5111"
    mem_limit: 512m
    cpus: 1.0

  postgres:
    image: docker.io/library/postgres:18
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  minio:
    image: docker.io/minio/minio:RELEASE.2025-03-12T18-04-18Z
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  postfix:
    image: boky/postfix
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    environment:
      ALLOWED_SENDER_DOMAINS: ${DOMAIN}

  livekit:
    image: docker.io/livekit/livekit-server:v1.10.0
    restart: unless-stopped
    profiles: [livekit]
    command: --config /etc/livekit.yaml
    network_mode: host  # Required for WebRTC UDP media ports
    mem_limit: 1g
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7880 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - /etc/livekit/livekit.yaml:/etc/livekit.yaml:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data:
  minio_data:
