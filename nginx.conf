# LiveKit WebSocket reverse proxy (TLS terminated by nginx)
server {
    listen 443 ssl;
    server_name livekit.gros-sans-dessein.com;

    ssl_certificate /etc/letsencrypt/live/livekit.gros-sans-dessein.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.gros-sans-dessein.com/privkey.pem;

    location / {
        # CORS for LiveKit client SDK
        add_header Access-Control-Allow-Origin "https://librecord.gros-sans-dessein.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# HTTP -> HTTPS redirect for LiveKit
server {
    listen 80;
    server_name livekit.gros-sans-dessein.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name DOMAIN_PLACEHOLDER;

    # Frontend (static files from Vite build)
    root /home/dev-egg/HostedPrograms/Librecord/Librecord.Client/dist;
    index index.html;

    # API reverse proxy
    location /api/ {
        proxy_pass http://127.0.0.1:5111/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Needed for cookie auth
        proxy_cookie_path / /;
    }

    # SignalR hubs (WebSocket support)
    location /api/hubs/ {
        proxy_pass http://127.0.0.1:5111/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # SPA fallback — serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access to dotfiles
    location ~ /\. {
        deny all;
    }
}
