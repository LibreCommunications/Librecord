# Blue-green upstream definitions are managed by deploy.sh
# Files: /etc/nginx/conf.d/librecord-upstream.conf
#         /etc/nginx/conf.d/librecord-test-upstream.conf
# LiveKit is configured separately in /etc/nginx/sites-enabled/livekit
#
# REQUIRES: nginx-hardening.conf in /etc/nginx/conf.d/ (rate limit zones, SSL, gzip)

# ==================== PRODUCTION ====================
server {
    listen 443 ssl;
    server_name librecord.gros-sans-dessein.com;

    ssl_certificate /etc/letsencrypt/live/librecord.gros-sans-dessein.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/librecord.gros-sans-dessein.com/privkey.pem;

    root /var/www/librecord/dist;
    index index.html;

    # Auth endpoints — strict rate limit
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://librecord-backend/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
    }

    # API reverse proxy (blue-green upstream)
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass http://librecord-backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 100M;
        client_body_timeout 300;
        proxy_cookie_path / /;
    }

    # SignalR hubs (WebSocket support)
    location /api/hubs/ {
        proxy_pass http://librecord-backend/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800;
        proxy_send_timeout 1800;
    }

    # MinIO presigned URL proxy — serves attachments directly from object storage
    location /storage/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host minio:9000;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        proxy_buffering on;
    }

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' wss://livekit.gros-sans-dessein.com; media-src 'self' blob:; font-src 'self'; frame-ancestors 'none';" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}

server {
    listen 80;
    server_name librecord.gros-sans-dessein.com;
    return 301 https://$host$request_uri;
}

