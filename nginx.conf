# Blue-green upstream definitions are managed by deploy.sh
# Files: /etc/nginx/conf.d/librecord-upstream.conf
#         /etc/nginx/conf.d/librecord-test-upstream.conf
# LiveKit is configured separately in /etc/nginx/sites-enabled/livekit

# ==================== PRODUCTION ====================
server {
    listen 443 ssl;
    server_name librecord.gros-sans-dessein.com;

    ssl_certificate /etc/letsencrypt/live/librecord.gros-sans-dessein.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/librecord.gros-sans-dessein.com/privkey.pem;

    root /var/www/librecord/dist;
    index index.html;

    # API reverse proxy (blue-green upstream)
    location /api/ {
        proxy_pass http://librecord-backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads (videos, images, etc.)
        client_max_body_size 100M;

        # Needed for cookie auth
        proxy_cookie_path / /;
    }

    # SignalR hubs (WebSocket support)
    location /api/hubs/ {
        proxy_pass http://librecord-backend/hubs/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' wss://*.gros-sans-dessein.com; media-src 'self' blob:; font-src 'self';" always;

    # SPA fallback — serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access to dotfiles
    location ~ /\. {
        deny all;
    }
}

server {
    listen 80;
    server_name librecord.gros-sans-dessein.com;
    return 301 https://$host$request_uri;
}

