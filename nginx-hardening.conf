# Drop this into /etc/nginx/conf.d/hardening.conf
# These directives live inside the http {} block.
# NOTE: SSL and base gzip are already in /etc/nginx/nginx.conf — don't duplicate them.

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Enhanced gzip (base gzip is on in nginx.conf, this adds types)
gzip_vary on;
gzip_min_length 256;
gzip_comp_level 5;
gzip_types application/json application/javascript text/css text/plain text/xml image/svg+xml;
