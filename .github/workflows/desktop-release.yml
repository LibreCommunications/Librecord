name: Desktop Release

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: Librecord.Client/pnpm-lock.yaml

      - name: Fetch latest pipecap (linux only)
        if: matrix.platform == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PIPECAP_TAG=$(gh release view --repo LibreCommunications/pipecap --json tagName -q .tagName)
          echo "Using pipecap $PIPECAP_TAG"
          git clone --depth 1 --branch "$PIPECAP_TAG" \
            https://github.com/LibreCommunications/pipecap.git "${GITHUB_WORKSPACE}/../pipecap"
          gh release download "$PIPECAP_TAG" \
            --repo LibreCommunications/pipecap \
            --pattern "*.node" \
            --dir "${GITHUB_WORKSPACE}/../pipecap"

      - name: Fetch latest wincap (windows only)
        if: matrix.platform == 'win'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = gh release view --repo LibreCommunications/wincap --json tagName -q .tagName
          Write-Host "Using wincap $tag"
          $dest = Join-Path $env:GITHUB_WORKSPACE "..\wincap"
          # Clone the repo (has package.json, lib.js, lib.d.ts, index.js,
          # index.d.ts, Cargo.toml, crates/). Then download the pre-built
          # .node binary from the GitHub release into the repo root where
          # napi-rs's index.js loader expects it.
          git clone --depth 1 --branch $tag https://github.com/LibreCommunications/wincap.git $dest
          gh release download $tag --repo LibreCommunications/wincap `
            --pattern "*.node" `
            --dir $dest

      - name: Install dependencies
        working-directory: Librecord.Client
        run: pnpm install --frozen-lockfile

      - name: Write frontend env
        run: echo "VITE_API_URL=https://${{ secrets.DOMAIN }}/api" > Librecord.Client/.env

      - name: Build and package
        working-directory: Librecord.Client/apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Provide GH_TOKEN so electron-builder generates latest*.yml
          # metadata files needed by electron-updater for auto-updates.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm build
          pnpm package:${{ matrix.platform }} --publish never

      # electron-builder --publish never skips generating latest*.yml on
      # some platforms. Generate latest-linux.yml manually for AppImage
      # auto-updates via electron-updater.
      - name: Generate latest-linux.yml (linux only)
        if: matrix.platform == 'linux'
        working-directory: Librecord.Client/apps/desktop
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          APPIMAGE=$(ls release/*.AppImage | head -1)
          SHA512=$(sha512sum "$APPIMAGE" | awk '{print $1}')
          SIZE=$(stat --printf='%s' "$APPIMAGE")
          FILENAME=$(basename "$APPIMAGE")
          DATE=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          printf 'version: %s\nfiles:\n  - url: %s\n    sha512: %s\n    size: %s\npath: %s\nsha512: %s\nreleaseDate: %s\n' \
            "$VERSION" "$FILENAME" "$SHA512" "$SIZE" "$FILENAME" "$SHA512" "$DATE" \
            > release/latest-linux.yml

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            Librecord.Client/apps/desktop/release/*.AppImage
            Librecord.Client/apps/desktop/release/*.dmg
            Librecord.Client/apps/desktop/release/*.zip
            Librecord.Client/apps/desktop/release/*.exe
            Librecord.Client/apps/desktop/release/latest*.yml
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: Librecord.Client/apps/desktop/package.json

      - name: Read version from package.json
        id: version
        run: echo "tag=v$(node -p "require('./Librecord.Client/apps/desktop/package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} artifacts/* \
            --repo ${{ github.repository }} \
            --title "Librecord Desktop ${{ steps.version.outputs.tag }}" \
            --generate-notes
