name: Deploy

on:
  push:
    branches: [master, test]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [production, test]

jobs:
  build:
    runs-on: self-hosted

    env:
      IS_PROD: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') }}
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
      DOTNET_USE_SHARED_COMPILATION: true

    environment: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') && 'production' || (github.event_name == 'workflow_dispatch' && inputs.environment) || 'test' }}

    steps:
      - name: Set environment config
        id: config
        run: |
          if [ "$IS_PROD" = "true" ]; then
            echo "slug=prod"             >> "$GITHUB_OUTPUT"
            echo "site=librecord"        >> "$GITHUB_OUTPUT"
            echo "db=librecord"          >> "$GITHUB_OUTPUT"
            echo "blue_port=5111"        >> "$GITHUB_OUTPUT"
            echo "green_port=5112"       >> "$GITHUB_OUTPUT"
            echo "postgres_port=5432"    >> "$GITHUB_OUTPUT"
            echo "minio_port=9000"       >> "$GITHUB_OUTPUT"
            echo "minio_console=9001"    >> "$GITHUB_OUTPUT"
            echo "bucket=librecord-attachments" >> "$GITHUB_OUTPUT"
          else
            echo "slug=test"             >> "$GITHUB_OUTPUT"
            echo "site=librecord-test"   >> "$GITHUB_OUTPUT"
            echo "db=librecord_test"     >> "$GITHUB_OUTPUT"
            echo "blue_port=5121"        >> "$GITHUB_OUTPUT"
            echo "green_port=5122"       >> "$GITHUB_OUTPUT"
            echo "postgres_port=5433"    >> "$GITHUB_OUTPUT"
            echo "minio_port=9010"       >> "$GITHUB_OUTPUT"
            echo "minio_console=9011"    >> "$GITHUB_OUTPUT"
            echo "bucket=librecord-test-attachments" >> "$GITHUB_OUTPUT"
          fi
          

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Write .env
        run: |
          cat > .env <<EOF
          DOMAIN=${{ secrets.DOMAIN }}
          POSTGRES_DB=${{ steps.config.outputs.db }}
          POSTGRES_USER=${{ steps.config.outputs.db }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT=${{ steps.config.outputs.postgres_port }}
          MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET=${{ steps.config.outputs.bucket }}
          MINIO_PORT=${{ steps.config.outputs.minio_port }}
          MINIO_CONSOLE_PORT=${{ steps.config.outputs.minio_console }}
          JWT_SIGNING_KEY=${{ secrets.JWT_SIGNING_KEY }}
          MESSAGE_ENCRYPTION_KEY=${{ secrets.MESSAGE_ENCRYPTION_KEY }}
          LIVEKIT_API_KEY=${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET=${{ secrets.LIVEKIT_API_SECRET }}
          BLUE_PORT=${{ steps.config.outputs.blue_port }}
          GREEN_PORT=${{ steps.config.outputs.green_port }}
          EOF
          chmod 600 .env
          echo "VITE_API_URL=https://${{ secrets.DOMAIN }}/api" > Librecord.Client/.env

      # ── Build, test, package + warm up infra in parallel ──────────
      - name: Build, test, package
        run: |
          set -euo pipefail

          # ── Warm up: pull base image + start infra while building ──
          docker pull mcr.microsoft.com/dotnet/aspnet:10.0 &
          PID_PULL=$!

          chmod +x .github/scripts/deploy.sh
          source .env
          export BLUE_PORT GREEN_PORT
          if [ "$IS_PROD" = "true" ]; then
            docker compose -p ${{ steps.config.outputs.site }} --env-file .env -f docker-compose.yml --profile livekit up -d postgres minio livekit &
          else
            docker compose -p ${{ steps.config.outputs.site }} --env-file .env -f docker-compose.yml up -d postgres minio &
          fi
          PID_INFRA=$!

          # ── .NET: build once, test + publish reuse it ──────────────
          (
            dotnet build Librecord.sln -c Release --nologo -v q
            dotnet test Librecord.Tests/Librecord.Tests.csproj -c Release --no-build --nologo -v q &
            PID_TEST=$!
            dotnet publish Librecord.Api/Librecord.Api.csproj -c Release --no-build --nologo -v q -o .publish &
            PID_PUB=$!
            wait $PID_TEST || exit 1
            wait $PID_PUB  || exit 1
          ) &
          PID_DOTNET=$!

          # ── Frontend: install + build + lint ──────────────────────
          (
            cd Librecord.Client
            if [ ! -d node_modules ] || [ pnpm-lock.yaml -nt node_modules/.pnpm/lock.yaml ]; then
              pnpm install --frozen-lockfile --prefer-offline
            fi
            npx tsc -b || { echo "::error::TypeScript check failed"; exit 1; }
            npx turbo build --filter=@librecord/web &
            PID_VITE=$!
            npx turbo lint --filter=@librecord/web &
            PID_LINT=$!
            FAIL=0
            wait $PID_VITE || { echo "::error::Vite build failed"; FAIL=1; }
            wait $PID_LINT || { echo "::error::ESLint failed"; FAIL=1; }
            [ $FAIL -eq 0 ] || exit 1
          ) &
          PID_FRONTEND=$!

          # ── Wait for all tracks ──────────────────────────────────
          FAIL=0
          wait $PID_DOTNET   || { echo "::error::Backend build/test failed"; FAIL=1; }
          wait $PID_FRONTEND || { echo "::error::Frontend failed"; FAIL=1; }
          wait $PID_PULL     || true
          wait $PID_INFRA    || true
          [ $FAIL -eq 0 ] || exit 1

      # ── Docker image + frontend deploy (parallel) ─────────────────
      - name: Build image and deploy frontend
        run: |
          set -euo pipefail
          SITE="${{ steps.config.outputs.site }}"

          printf 'FROM mcr.microsoft.com/dotnet/aspnet:10.0\nWORKDIR /app\nRUN apt-get update && apt-get install -y --no-install-recommends libkrb5-3 && rm -rf /var/lib/apt/lists/*\nRUN useradd --no-create-home --shell /bin/false appuser\nCOPY --chown=appuser .publish/ .\nUSER appuser\nEXPOSE 5111\nENTRYPOINT ["dotnet", "Librecord.Api.dll"]\n' | \
          docker build -t "${SITE}-backend:latest" -f - . &
          PID_IMG=$!

          rm -rf "/var/www/${SITE}/dist"
          cp -r Librecord.Client/apps/web/dist "/var/www/${SITE}/dist"

          wait $PID_IMG || exit 1

      - name: Blue-green deploy backend
        run: .github/scripts/deploy.sh ${{ steps.config.outputs.slug }}
